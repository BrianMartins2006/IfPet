<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IfPet - Login</title>
</head>
<body>
    <div style="text-align: center;">
        <h1>🐾 IfPet</h1>
        <hr>
        <h2>Acesso ao Sistema</h2>
        <table border="1" style="border-collapse: collapse; margin-left: auto; margin-right: auto;">
            <tr>
                <td style="padding: 10px;">
                    <form action="index.html">
                        <p>
                            <label for="username">Usuário:</label><br>
                            <input type="text" id="username" name="username" required>
                        </p>
                        <p>
                            <label for="password">Senha:</label><br>
                            <input type="password" id="password" name="password" required>
                        </p>
                        <div style="text-align: center;">
                            <input type="submit" value="Entrar no Sistema">
                        </div>
                    </form>
                </td>
            </tr>
        </table>
        <p><i>Dica: Use qualquer usuário e senha para entrar.</i></p>
    </div>

    <hr>

    <div style="text-align: center;">
        <p>Desenvolvido por Brian, Lucas e Luiz</p>
    </div>
</body>
</html>
