<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IfPet - Cadastro</title>
</head>

<body>
    <table style="width: 100%; border: 0;">
        <tr>
            <td style="text-align: left;">
                <h1>🐾 IfPet</h1>
            </td>
            <td style="text-align: right;">
                <table border="1" style="border-collapse: collapse;">
                    <tr>
                        <td style="padding: 5px;"><a href="index.html">Home</a></td>
                        <td style="padding: 5px;"><a href="historia.html">História</a></td>
                        <td style="padding: 5px;"><a href="cadastro.html">Cadastro</a></td>
                        <td style="padding: 5px;"><a href="consulta.html">Consulta</a></td>
                        <td style="padding: 5px;"><a href="login.html">Login</a></td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

    <hr>

    <div style="text-align: center;">
        <h2>Cadastro de Novo Pet</h2>
        <table border="1" style="border-collapse: collapse; margin-left: auto; margin-right: auto;">
            <tr>
                <td style="padding: 10px;">
                    <form action="consulta.html">
                        <p>
                            <label for="petName">Nome do Pet:</label><br>
                            <input type="text" id="petName" name="petName" required>
                        </p>
                        <p>
                            <label for="species">Espécie:</label><br>
                            <select id="species" name="species" required>
                                <option value="">Selecione...</option>
                                <option value="Cão">Cão</option>
                                <option value="Gato">Gato</option>
                                <option value="Pássaro">Pássaro</option>
                                <option value="Outro">Outro</option>
                            </select>
                        </p>
                        <p>
                            <label for="breed">Raça:</label><br>
                            <input type="text" id="breed" name="breed" required>
                        </p>
                        <p>
                            <label for="owner">Nome do Responsável:</label><br>
                            <input type="text" id="owner" name="owner" required>
                        </p>
                        <div style="text-align: center;">
                            <input type="submit" value="Cadastrar Pet">
                        </div>
                    </form>
                </td>
            </tr>
        </table>
    </div>

    <hr>

    <div style="text-align: center;">
        <p>Desenvolvido por Brian, Lucas e Luiz</p>
    </div>
</body>

</html>
